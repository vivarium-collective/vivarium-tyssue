# Auto-generated by scripts/gen_composites.py — declarative replacement for
# the procedural get_test_*_spec() helper in tests/tests.py.
name: base_solver
description: "Baseline tyssue vertex model on a cylindrical (vessel) sheet, integrated with the generalized\
  \ Euler solver. No behaviors \u2014 pure mechanical relaxation."
tags:
- tissue
- mechanics
- geometry
requires:
  processes:
  - EulerSolver
  types:
  - tyssue_data
  - behaviors
emitters:
- address: local:DataFrameParquetEmitter
  config:
    out_dir: out/parquet
  paths:
  - Datasets/vert_df
  - Datasets/face_df
  - Datasets/edge_df
  - Datasets/cell_df
parameters:
  interval:
    type: float
    default: 0.1
    description: Solver / step interval (dt).
state:
  Tyssue:
    _type: process
    address: local:EulerSolver
    config:
      name: Test Cylinder
      eptm: workspace/datasets/test_cylinder.hf5
      tissue_type: Sheet
      parameters:
        face_df:
          area_elasticity: 1.0
          prefered_area: 1.0
          perimeter_elasticity: 0.5
          prefered_perimeter: 3.5
        edge_df:
          line_tension: 0.0
          is_active: 1.0
        vert_df:
          viscosity: 0.1
          vessel_elasticity: 1.0
          prefered_radius: 2.5
          is_alive: 1.0
      geom: VesselGeometry
      effectors:
      - LineTension
      - FaceAreaElasticity
      - PerimeterElasticity
      - VesselSurfaceElasticity
      ref_effector: FaceAreaElasticity
      factory: model_factory
      settings:
        threshold_length: 0.03
      auto_reconnect: true
      bounds: {}
      output_columns: {}
      maps: {}
    inputs:
      behaviors:
      - Behaviors
      global_time:
      - global_time
    outputs:
      datasets:
      - Datasets
      network_changed:
      - Network Changed
      behaviors_update:
      - Behaviors
    interval: ${interval}
  Network Changed: false
  Behaviors: {}
