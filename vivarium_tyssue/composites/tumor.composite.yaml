name: tumor
description: Breast-cancer population ODE (BIOMD0000000903 in COPASI) coupled to a
  flat 2D tyssue sheet — per-step birth/death fluxes drive discrete division /
  apoptosis / differentiation on the mesh (tumor / healthy / stem cell types).
tags:
- tissue
- multi-cell
- cells
- tumor
- sbml
requires:
  processes:
  - EulerSolver
  - TumorCoupling
  types:
  - tyssue_data
  - behaviors
# No DataFrameParquetEmitter here: pyarrow 24 can't merge the object-dtype
# cell_type column across frames (large_string vs string). The study viz read
# runs.db (SQLite), which the dashboard injects at run time, so parquet isn't
# needed. Leaving emitters empty keeps standalone runs clean.
emitters: []
parameters:
  interval:
    type: float
    default: 0.1
    description: Solver / coupling step (dt). 0.1 keeps the vertex-model mechanics
      stable (larger steps overflow); COPASI advances by this dt each step.
state:
  Tyssue:
    _type: process
    address: local:EulerSolver
    config:
      name: Tumor Epithelium 2D
      eptm: workspace/datasets/test_square.hf5
      tissue_type: Sheet
      parameters:
        face_df:
          area_elasticity: 1.0
          prefered_area: 1.0
          perimeter_elasticity: 0.1
          prefered_perimeter: 3.6
          cell_type: healthy
          is_alive: 1.0
        edge_df:
          line_tension: 0.0
          is_active: 1.0
        vert_df:
          viscosity: 1.0
          is_alive: 1.0
      geom: SheetGeometry
      effectors:
      - LineTension
      - FaceAreaElasticity
      - PerimeterElasticity
      ref_effector: FaceAreaElasticity
      factory: model_factory
      settings:
        threshold_length: 0.03
      auto_reconnect: true
      bounds: {}
      output_columns: {}
      maps: {}
    inputs:
      behaviors:
      - Behaviors
      global_time:
      - global_time
    outputs:
      datasets:
      - Datasets
      network_changed:
      - Network Changed
      behaviors_update:
      - Behaviors
    interval: ${interval}
  TumorCoupling:
    _type: process
    address: local:TumorCoupling
    config:
      # COPASI is owned internally (model_source); see the process docstring for
      # why fluxes aren't passed through a shared store.
      model_source: workspace/datasets/BIOMD0000000903.xml
      copasi_time: 1.0
      copasi_intervals: 10
      birth_fluxes:
        tumor: Induction of tumor cell
        healthy: Increase in the healthy cell in the system
        stem: Formation of Stem cell
      death_fluxes:
        tumor: Removal of tumor cell y immune cell and other immune response
        healthy: Decrase of healthy cell due to cancer
        stem: Removal of stem cell from the system
      # scales convert SBML fluxes (O(1e3-1e7)) into mesh events at interval=0.1;
      # tuned so tumor expands and healthy declines on a watchable cadence.
      scales:
        tumor_births: 2.0e-6
        tumor_deaths: 8.0e-7
        healthy_births: 6.0e-8
        healthy_deaths: 1.2e-7
        stem_births: 6.0e-7
        stem_deaths: 2.0e-5
      geom: SheetGeometry
      dt: 1.0
      growth_rate: 0.1
      shrink_rate: 0.1
      division_crit: 0.5
      apoptosis_crit: 2.0
      seed:
        tumor: 8
        stem: 2
      # Real vertex-model topology: births split a cell (cell_division), deaths
      # extrude it (remove_face). Enabled now that the workspace runs the
      # pandas-3-compatible forked tyssue (vivatyssue src) — stock tyssue 1.1.0
      # crashes here (read-only array in get_opposite). See README fork caveat.
      topology_ops: true
    inputs:
      datasets:
      - Datasets
      global_time:
      - global_time
    outputs:
      behaviors:
      - Behaviors
      tumor_births:
      - tumor_births
      tumor_deaths:
      - tumor_deaths
      healthy_births:
      - healthy_births
      healthy_deaths:
      - healthy_deaths
      stem_births:
      - stem_births
      stem_deaths:
      - stem_deaths
      tumor_count:
      - tumor_count
      healthy_count:
      - healthy_count
      stem_count:
      - stem_count
      dead_count:
      - dead_count
      total_count:
      - total_count
      healthy_fraction:
      - healthy_fraction
    interval: ${interval}
  Network Changed: false
  Behaviors: {}
  tumor_births: 0.0
  tumor_deaths: 0.0
  healthy_births: 0.0
  healthy_deaths: 0.0
  stem_births: 0.0
  stem_deaths: 0.0
  tumor_count: 0.0
  healthy_count: 0.0
  stem_count: 0.0
  dead_count: 0.0
  total_count: 0.0
  healthy_fraction: 0.0
