schema_version: 2
name: tumor-tyssue
title: Tumor population dynamics on a tyssue 2D epithelium
created: "2026-06-12"
status: running
question: >-
  Can a non-spatial SBML tumor-population model (BioModels BIOMD0000000903, run in
  COPASI) drive discrete cell birth/death/differentiation on a tyssue 2D epithelial
  sheet, and how does the resulting tissue differ from a baseline epithelium?
hypothesis: >-
  Coupling the breast-cancer competition ODE to the mesh — each step converting the
  model's reaction fluxes into scaled cell-fate events — reproduces the expected
  qualitative trends: tumor cells expand from a seeded focus while healthy tissue is
  progressively displaced, diverging clearly from a mechanics-only baseline sheet.
description: >-
  BIOMD0000000903 (Solís-Pérez et al., 2019) is a fractional ODE over five
  populations — cancer-stem (C), tumor (T), healthy (H), immune (I), estrogen (E).
  A new flux-driven TumorCoupling process scales each per-step birth/death flux into
  a fractional accumulator and fires integer cell-fate events on a flat SheetGeometry
  mesh (tumor / healthy / stem / dead cell types). I and E remain SBML-internal
  drivers with no mesh cells. The coupling is a qualitative mechanism, not a
  quantitatively validated spatial tumor model — see each study's limitations.
studies:
- tumor-composite
- tumor-vs-baseline
acceptance_criteria:
- study: tumor-composite
  behavior: SBML reaction fluxes drive discrete cell-fate events on the mesh (births
    and deaths fire under flux control, not at random).
- study: tumor-vs-baseline
  behavior: The tumor composite diverges from the mechanics-only baseline — tumor
    expansion and healthy decline versus a uniformly healthy sheet.
how_to_read: >-
  Start with study tumor-composite (the coupled model and its five visualizations),
  then tumor-vs-baseline for the controlled comparison against a plain epithelial sheet.
