schema_version: 3
name: tumor-vs-baseline
created: "2026-06-12"
status: in-progress
phase: Simulate
design_status: approved
implementation_status: complete
simulation_status: ran
evaluation_status: not_evaluated
parent_studies:
- tumor-composite
objective: >-
  Compare the COPASI-coupled tumor composite against a mechanics-only baseline
  epithelial sheet of identical geometry, isolating the effect of the tumor coupling.
hypothesis: >-
  With tumor coupling off (baseline), the sheet stays uniformly healthy; with it on
  (tumor), cell-type composition shifts toward tumor and dead cells while healthy cells
  decline — a clear, controlled divergence.
description: >-
  Two simulation sources on the same flat SheetGeometry sheet (test_square): `tumor`
  (COPASI BIOMD0000000903 coupled) and `epithelium_2d` (EulerSolver only, no coupling).
  Run for matched step counts and compare cell-type composition, cumulative
  births/deaths, tissue morphology/area, and healthy-cell survival.
baseline:
- name: tumor
  composite: vivarium_tyssue.composites.tumor
  description: COPASI-coupled tumor composite.
- name: baseline
  composite: vivarium_tyssue.composites.epithelium_2d
  description: Mechanics-only flat 2D sheet — no tumor coupling (control).
observables:
- {name: tumor_count,    store_path: tumor_count,    units: cells, description: Tumor cells on the mesh}
- {name: healthy_count,  store_path: healthy_count,  units: cells, description: Healthy cells on the mesh}
- {name: stem_count,     store_path: stem_count,     units: cells, description: Stem cells on the mesh}
- {name: dead_count,     store_path: dead_count,     units: cells, description: Dead cells on the mesh}
- {name: tumor_births,   store_path: tumor_births,   units: events/step, description: Tumor births this step}
- {name: healthy_deaths, store_path: healthy_deaths, units: events/step, description: Healthy deaths this step}
# readouts[].store_path drives the run emitter (collect_emit_paths_from_spec).
readouts:
- {name: tumor_count,    store_path: tumor_count,    units: cells}
- {name: healthy_count,  store_path: healthy_count,  units: cells}
- {name: stem_count,     store_path: stem_count,     units: cells}
- {name: dead_count,     store_path: dead_count,     units: cells}
- {name: tumor_births,   store_path: tumor_births,   units: events/step}
- {name: healthy_deaths, store_path: healthy_deaths, units: events/step}
- {name: vert_df, store_path: Datasets/vert_df, description: mesh vertices}
- {name: edge_df, store_path: Datasets/edge_df, description: mesh edges}
- {name: face_df, store_path: Datasets/face_df, description: cells (cell_type)}
visualizations:
- name: Cell-type counts — tumor vs baseline
  address: local:TimeSeriesFromObservables
  config:
    title: Cell-type counts — tumor vs baseline
    observables: [tumor_count, healthy_count, dead_count]
    sources: [tumor, baseline]
- name: Births and deaths — tumor vs baseline
  address: local:TimeSeriesFromObservables
  config:
    title: Births & deaths — tumor vs baseline
    observables: [tumor_births, healthy_deaths]
    sources: [tumor, baseline]
- name: Baseline sheet snapshots
  address: local:TissueSheetSnapshots
  config: {title: Baseline sheet snapshots, coords: [x, y], n_panels: 6, sources: [baseline]}
- name: Tumor sheet snapshots
  address: local:TissueSheetSnapshots
  config: {title: Tumor sheet snapshots, coords: [x, y], n_panels: 6, sources: [tumor]}
expected_behavior:
- "Baseline: composition stays 100% healthy, no births/deaths, morphology relaxes uniformly."
- "Tumor: composition shifts toward tumor + dead, healthy declines, cumulative tumor
  births and healthy deaths are nonzero."
key_assumptions:
- Same geometry and mechanics in both arms; the only difference is the tumor coupling.
- Comparison is qualitative (composition/trend), consistent with the parent study's
  framing.
limitations:
- Inherits the tumor-composite limitations (qualitative fixed-topology fate model under
  the forced numpy-2.2 / pandas-3.0 stack).
- Morphology/area comparison is coarse since the mesh topology is fixed in the default
  fate mode.
# Both arms run 60 steps (interval 0.1) on the same flat SheetGeometry sheet.
behavior_tests:
- name: baseline_stays_uniform
  classification: quantitative
  question: Does the mechanics-only baseline stay 100% healthy (no births/deaths)?
  measure: {kind: last, path: healthy_count}
  pass_if: {op: eq, threshold: 206}
  result: PASS
  notes: "baseline final healthy_count = 206 (0 tumor, 0 dead) — uniform control."
- name: tumor_arm_diverges
  classification: quantitative
  question: Does the tumor arm diverge from baseline (tumor cells appear)?
  measure: {kind: last, path: tumor_count}
  pass_if: {op: gt, threshold: 10}
  result: PASS
  notes: "tumor arm final tumor_count = 64 vs baseline 0."
- name: healthy_survival_gap
  classification: quantitative
  question: Is healthy survival lower in the tumor arm than baseline?
  measure: {kind: last, path: healthy_count}
  pass_if: {op: lt, threshold: 206}
  result: PASS
  notes: "tumor arm healthy_count = 114 vs baseline 206 — a 92-cell (45%) survival gap."
findings:
- id: F1
  kind: computational
  status: confirms
  statement: With tumor coupling off, the sheet stays uniformly healthy; with it on,
    composition shifts toward tumor and dead — a clean, controlled divergence.
  summary: "Cell-type composition over 60 steps — baseline: 206 healthy throughout\
    \ (0 tumor, 0 dead); tumor arm: 114 healthy / 64 tumor / 28 dead. The only\
    \ difference between the arms is the COPASI coupling, so the divergence is\
    \ attributable to the SBML-driven cell-fate events."
  explanation: See the 'Cell-type counts — tumor vs baseline' overlay and the
    side-by-side snapshot panels.
  evidence: {from_test: tumor_arm_diverges, observed: 64, units: cells}
- id: F2
  kind: biological
  status: confirms
  statement: The tumor model displaces ~45% of healthy tissue relative to the
    untreated baseline over the run.
  summary: Healthy-cell survival diverges from 206 (baseline) to 114 (tumor arm) —
    a 92-cell loss driven by the model's tumor-kills-healthy and stem→tumor fluxes,
    against a baseline where healthy tissue is fully preserved.
  evidence: {from_test: healthy_survival_gap, observed: 114, units: cells}
conclusion: The controlled comparison isolates the tumor coupling's effect — the
  mechanics-only baseline stays 100% healthy across all 60 steps, while the
  COPASI-coupled arm shifts to 114 healthy / 64 tumor / 28 dead. All three
  acceptance tests pass. Morphology is comparable (fixed topology in the default
  fate mode); the divergence is in composition and healthy-cell survival.
biological_summary: The baseline represents undisturbed epithelium; the tumor arm
  adds BIOMD0000000903's population dynamics. The 45% healthy-tissue loss in the
  tumor arm, absent in the baseline, is the spatial read-out of the model's
  tumor-versus-healthy competition.
conclusion_verdicts:
- claim: Baseline epithelium remains uniformly healthy
  verdict: supported
  basis: baseline_stays_uniform test passes (206 healthy, 0 tumor/dead)
- claim: Tumor coupling causes composition shift + healthy-tissue loss
  verdict: supported
  basis: tumor_arm_diverges + healthy_survival_gap tests pass
